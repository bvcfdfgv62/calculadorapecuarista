<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <!-- Security: Content Security Policy -->
  <!-- scripts: only from same origin + inline hashes (needed for bundled React) -->
  <!-- connect-src: restricts API calls to Supabase and fonts -->
  <!-- frame-ancestors: blocks clickjacking -->
  <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob:;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co;
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self';
    ">
  <!-- Security: prevent MIME-type sniffing -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <!-- Security: don't send Referer header to external domains -->
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Inter:wght@100..900&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/png" href="/logo-corteva.png" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/logo-corteva.png" />
  <meta name="theme-color" content="#0d8a43" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Calculadora para Pecuaristas | Oficial</title>
</head>


<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
